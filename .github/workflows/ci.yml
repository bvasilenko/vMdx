name: ci

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

      - name: scrub
        run: bash .github/scripts/scrub.sh .

      - name: build
        run: bun run build

      - name: determinism-check
        run: |
          mv dist dist-1
          bun run build
          diff -r dist dist-1 || (echo "non-deterministic build" && exit 1)
          rm -rf dist-1

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: setup-npm-auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
